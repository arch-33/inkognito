name: Release

# ─────────────────────────────────────────────────────────────────
# Go to GitHub → Actions → Release → Run workflow
# Enter the version (e.g. 1.2.0) and click Run.
#
# This workflow will:
#   1. Bump versions in package.json, tauri.conf.json, Cargo.toml
#   2. Commit, tag (v<version>), and push
#   3. Build for macOS / Windows / Linux → publish GitHub Release
# ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (semver, e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1 — Bump all version files, commit, tag, push
  # ─────────────────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate version
        id: bump
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Not valid semver: $VERSION"
            exit 1
          fi

          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Set version in all files
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          # package.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

          # src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

          # src-tauri/Cargo.toml (replace the top-level version line)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Update Cargo.lock
        run: |
          cd src-tauri
          # Install minimal Rust just to update the lockfile
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          source "$HOME/.cargo/env"
          cargo generate-lockfile

      - name: Commit, tag, and push
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD --follow-tags

  # ─────────────────────────────────────────────────────────────────
  # Job 2 — Build all platforms → GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    needs: version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust_target }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID — direct / GitHub Release distribution)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "Inkognito ${{ needs.version.outputs.tag }}"
          releaseBody: |
            ## Inkognito ${{ needs.version.outputs.tag }}

            | Platform | Download |
            |---|---|
            | macOS Apple Silicon | `Inkognito_*_aarch64.dmg` |
            | macOS Intel | `Inkognito_*_x64.dmg` |
            | Windows | `Inkognito_*_x64-setup.exe` / `.msi` |
            | Linux | `inkognito_*.deb` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────────────────
  # Job 3 — Build arm64, sign with Apple Distribution, upload to App Store
  # ─────────────────────────────────────────────────────────────────
  appstore:
    runs-on: macos-latest
    needs: [version, release]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-appstore-${{ hashFiles('src-tauri/Cargo.lock') }}

      # ── Import Apple Distribution certificate into a temporary keychain ──
      - name: Import Apple Distribution certificate
        env:
          APPSTORE_CERTIFICATE: ${{ secrets.APPSTORE_CERTIFICATE }}
          APPSTORE_CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPSTORE_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/distribution.p12 -k build.keychain \
            -P "$APPSTORE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm /tmp/distribution.p12

      - name: Import Installer certificate
        env:
          INSTALLER_CERTIFICATE: ${{ secrets.INSTALLER_CERTIFICATE }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$INSTALLER_CERTIFICATE" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k build.keychain \
            -P "$INSTALLER_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm /tmp/installer.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/Inkognito.provisionprofile

      # ── Build with Tauri (skip Tauri's codesigning — we sign manually below) ──
      - name: Build app for App Store
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          # Do NOT set APPLE_SIGNING_IDENTITY here — Tauri would sign with
          # Developer ID; we re-sign with Apple Distribution below.
        run: |
          pnpm tauri build --target aarch64-apple-darwin

      # ── Sign for App Store (inside-out) ────────────────────────────
      - name: Prepare and sign App Store bundle
        env:
          SIGNING_IDENTITY: "Apple Distribution: Mohamed Elbssir (UD29PDQT67)"
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Inkognito.app"

          # Embed provisioning profile
          cp ~/Library/MobileDevice/Provisioning\ Profiles/Inkognito.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"

          # Strip quarantine attributes
          xattr -cr "$APP_PATH"

          # Sign frameworks & dylibs first (inside-out)
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -perm +111 \) | while read -r lib; do
              codesign --force --options runtime \
                --sign "$SIGNING_IDENTITY" "$lib"
            done
          fi

          # Sign the main binary
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_PATH/Contents/MacOS/Inkognito"

          # Sign the overall app bundle
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"
          echo "✅ App signed for App Store"

      # ── Package as .pkg ────────────────────────────────────────────
      - name: Create App Store .pkg
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Inkognito.app"
          productbuild \
            --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer: Mohamed Elbssir (UD29PDQT67)" \
            Inkognito.pkg
          echo "✅ .pkg created ($(du -h Inkognito.pkg | cut -f1))"

      # ── Validate before uploading ──────────────────────────────────
      - name: Validate .pkg with App Store Connect
        run: |
          xcrun altool --validate-app \
            --type macos \
            --file Inkognito.pkg \
            --username "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}"
          echo "✅ Validation passed"

      # ── Upload to App Store Connect ────────────────────────────────
      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file Inkognito.pkg \
            --username "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}"
          echo "✅ Uploaded to App Store Connect"

      # ── Attach .pkg to the GitHub Release ─────────────────────────
      - name: Attach .pkg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Inkognito.pkg
          tag_name: ${{ needs.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
